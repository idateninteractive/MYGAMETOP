<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sigma Team Games</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; color: #c6d4df; background-image: linear-gradient(rgba(27, 40, 56, 0.85), rgba(27, 40, 56, 0.85)), url('https://www.wallpaperalchemy.com/storage/wallpapers/329/battlefield-6-engineer-4k-gaming-wallpaper.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; }
        .header_wrapper { background-color: #171a21; padding: 15px 0; border-bottom: 2px solid #66c0f4; }
        .content { max-width: 940px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo { font-size: 28px; font-weight: bold; color: #ffffff; }
        .search_bar { width: 300px; padding: 8px; background: #101822; border: 1px solid #334455; color: #fff; }
        .discord_link { color: #7289da; text-decoration: none; font-weight: bold; }

        .game_container { max-width: 940px; margin: 30px auto; }
        .game_grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .game_card { background: #16202d; padding: 10px; border: 1px solid #000; cursor: pointer; transition: 0.2s; text-align: center; }
        .game_card:hover { transform: scale(1.03); background: #1a293a; }
        .game_img { width: 100%; height: 100px; background-size: cover; background-position: center; margin-bottom: 10px; }

        #profile_section { max-width: 940px; margin: 30px auto; background: #101822; padding: 25px; display: none; border: 1px solid #334455; }
        .profile_layout { display: flex; gap: 30px; margin-bottom: 30px; }
        .profile_img { width: 320px; min-height: 400px; background-size: contain; background-repeat: no-repeat; background-position: center; border: 1px solid #66c0f4; background-color: #000; flex-shrink: 0; }
        .profile_info { flex: 1; display: flex; flex-direction: column; }
        .video_container { width: 100%; height: 350px; background: #000; margin-bottom: 20px; }
        
        .btn_container { display: flex; justify-content: center; align-items: center; padding-top: 10px; min-height: 80px; }
        .download_img_btn { cursor: pointer; width: 280px; height: 70px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="header_wrapper">
        <div class="content">
            <div class="logo">Sigma Team</div>
            <input type="text" class="search_bar" placeholder="Search games...">
            <a href="#" class="discord_link">DISCORD</a>
        </div>
    </div>

    <div class="game_container">
        <div class="game_grid">
            <div class="game_card" onclick="showProfile('asv')"><div class="game_img" style="background-image: url('https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/6290/header.jpg?t=1740580528');"></div>Alien Shooter: Vengeance</div>
            <div class="game_card" onclick="showProfile('zs2')"><div class="game_img" style="background-image: url('https://gogunlocked.com/wp-content/uploads/2021/03/Zombie-Shooter-2-Free-Download.jpg');"></div>Zombie Shooter 2</div>
            <div class="game_card" onclick="showProfile('as2l')"><div class="game_img" style="background-image: url('https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1007400/header.jpg?t=1700734144');"></div>Alien Shooter 2: The Legend</div>
            <div class="game_card" onclick="showProfile('as2r')"><div class="game_img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQt5rUnPw5RPy1XYCqMNks6ibo7vNVDa4qnRGWDkYAQLvM87QIw0sb-TuU&s=10');"></div>Alien Shooter 2: Reloaded</div>
            <div class="game_card" onclick="showProfile('aslh')"><div class="game_img" style="background-image: url('https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/951530/capsule_616x353.jpg?t=1687441319');"></div>Alien Shooter – Last Hope</div>
            <div class="game_card" onclick="showProfile('igi')"><div class="game_img" style="background-image: url('https://staticdelivery.nexusmods.com/mods/5349/images/5/5-1756602565-549867849.png');"></div>Project IGI: Neonix Remastered</div>
            <div class="game_card" onclick="showProfile('igi2')"><div class="game_img" style="background-image: url('https://staticdelivery.nexusmods.com/mods/5664/images/8/8-1726626244-2078707165.png');"></div>I.G.I 2 Neonix Patch</div>
        </div>
    </div>

    <div id="profile_section">
        <h1 id="p_title" style="color: #ffffff; margin-top: 0;"></h1>
        <div class="profile_layout">
            <div id="p_img" class="profile_img"></div>
            <div class="profile_info">
                <div class="video_container">
                    <iframe id="p_video" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="btn_container">
                    <a id="dl_link" href="#" target="_blank">
                        <img src="https://archive.org/download/new-project-2_20260715/New%20Project%282%29.png" class="download_img_btn" id="dl_btn">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const games = {
            'asv': { title: 'Alien Shooter: Vengeance', img: 'https://cdn.mobygames.com/covers/4787964-alien-shooter-vengeance-windows-front-cover.jpg', video: 'https://www.youtube.com/embed/ACVLiM7OmaI', dl: 'https://pixeldrain.com/u/tKndRgP9' },
            'zs2': { title: 'Zombie Shooter 2', img: 'https://cdn2.steamgriddb.com/grid/8b335fa0f1f44814d43a9f6560794acd.png', video: 'https://www.youtube.com/embed/YhMCWhnABN8', dl: 'https://pixeldrain.com/u/jAjo27A3' },
            'as2l': { title: 'Alien Shooter 2: The Legend', img: 'https://cdn2.steamgriddb.com/grid/8aafbec485367229542990511bafc0b5.png', video: 'https://www.youtube.com/embed/iiiLRqRVgbA', dl: 'https://megaup.net/d1a512ef48369657acaea7ab17b981bd/AlienShoot2ReloadedGOG.rar' },
            'as2r': { title: 'Alien Shooter 2: Reloaded', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQVxaxvDT3IN0n1Wi0s0fgnr1MDpsqdHQ2v6KezP8h9eC4sa_mb2OGu1-6R&s=10', video: 'https://www.youtube.com/embed/x9o284YDetQ', dl: 'https://megaup.net/d1a512ef48369657acaea7ab17b981bd/AlienShoot2ReloadedGOG.rar' },
            'aslh': { title: 'Alien Shooter – Last Hope', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRCZZnY9mjgser5R6WcFyBve0i7_JeRqFMIBvS1DotZtk7NrS3bTtUhEz4&s=10', video: 'https://www.youtube.com/embed/rbexTPNjWlY', dl: 'https://pixeldrain.com/u/di996nxv' },
            'igi': { title: 'Project IGI: Neonix Remastered', img: 'https://cdn.phototourl.com/free/2026-07-16-91347105-2bb4-4628-a285-ab75cb20e9fc.png', video: 'https://www.youtube.com/embed/tq5N5CmAY0w', dl: 'https://files.nexus-cdn.com/5349/5/IGI%201%20Neonix%20Remastered%201.4-5-1-4-1757006135.zip?md5=2PlnvN9RAf0lIt6nUG66lA&expires=1784202951&user_id=257889931' },
            'igi2': { title: 'I.G.I 2 Neonix Patch', img: 'https://staticdelivery.nexusmods.com/mods/5664/images/8/8-1726689161-1674143600.png', video: 'https://www.youtube.com/embed/hUqyL1vWMuY', dl: 'https://files.nexus-cdn.com/5664/8/IGI2NeonixPatch%201.3-8-1-3-1738873666.zip?md5=O6rs0IfUuqhUihE_hKd6qg&expires=1784203382&user_id=257889931' }
        };

        function showProfile(id) {
            const profile = document.getElementById('profile_section');
            const g = games[id];
            if (!g) return;
            
            document.getElementById('p_title').innerText = g.title;
            document.getElementById('p_img').style.backgroundImage = 'url("' + g.img + '")';
            document.getElementById('p_video').src = g.video;
            
            const dlBtn = document.getElementById('dl_btn');
            document.getElementById('dl_link').href = g.dl;
            dlBtn.style.display = 'block';

            profile.style.display = 'block';
            profile.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
